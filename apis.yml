    name: AWS Health API
    description: >-
      The AWS Health API provides programmatic access to AWS Health information
      about events that can affect your AWS infrastructure, including service
      outages, planned maintenance, and account-specific notifications.
    humanURL: https://aws.amazon.com/health/
