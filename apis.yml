aid: amazon-health-dashboard
name: Amazon Health Dashboard
description: >-
  AWS Health Dashboard provides ongoing visibility into the status of your AWS
  services, and alerts and remediation guidance when AWS is experiencing events
  that may affect your operations. It delivers personalized information about
  events that might affect your specific AWS resources and accounts.
